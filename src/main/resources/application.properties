# 1. MySQL 연결 설정 (반드시 Workbench의 정보와 일치해야 함)
spring.datasource.url=jdbc:mysql://localhost:3306/politics?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=ssafy
spring.datasource.password=ssafy

# 2. MySQL 드라이버 설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. JPA/Hibernate 설정 (MySQL 문법 사용)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# 기존의 MySQL8Dialect 줄을 지우고 아래 한 줄로 대체하거나, 아예 삭제하세요.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 4. (선택) H2 콘솔 끄기 (이제 필요 없음)
spring.h2.console.enabled=false
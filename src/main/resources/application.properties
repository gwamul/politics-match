spring.application.name=politics-match

# 1. MySQL 연결 설정 (반드시 Workbench의 정보와 일치해야 함)
spring.datasource.url=jdbc:mysql://localhost:3306/politics?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=ssafy
spring.datasource.password=ssafy

# 2. MySQL 드라이버 설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. JPA/Hibernate 설정 (MySQL 문법 사용)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 4. H2 콘솔 끄기 (MySQL 사용 중)
spring.h2.console.enabled=false

# ============================================
# 5. Open API 설정
# ============================================
na.api.key=20cf57600272472aa72df90be905c3b0

# ============================================
# 6. Vote 데이터 업데이트 설정
# ============================================
# 현재 국회 대수 (기본값: 22)
vote.update.current-age=22

# CSV 파일 경로 (초기 로드 시에만 사용)
vote.csv.path=C:\\Users\\SSAFY\\Desktop\\데이터_국회의원 본회의 표결정보.csv

# 스케줄러 활성화 (기본값: true)
vote.scheduler.enabled=true

# 일일 업데이트 Cron (기본값: 매일 새벽 2시)
vote.scheduler.daily.cron=0 0 2 * * *

# 주간 업데이트 Cron (기본값: 매주 월요일 새벽 3시)
vote.scheduler.weekly.cron=0 0 3 ? * MON

# API 호출 간격 (밀리초, 기본값: 200ms)
vote.scheduler.api-delay-ms=200

# ============================================
# 7. 로깅 설정
# ============================================
logging.level.root=INFO
logging.level.com.jgs.politics=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
